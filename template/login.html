<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion NCS-Web</title>
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='images/logo.jpeg') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #27ae60;
            --secondary-color: #c0392b;
            --success-color: #27ae60;
            --danger-color: #c0392b;
            --background-color: #ffffff;
        }
        
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            position: relative;
            overflow: hidden;
        }

        /* ── Image de fond ── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?w=1800&q=80');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* ── Overlay sombre ── */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: 1;
        }
        
        .login-container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
            position: relative;
            z-index: 2;
        }
        
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            background: white;
            overflow: hidden;
        }
        
        .login-header {
            background: white;
            color: #27ae60;
            padding: 40px 30px;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2);
        }
        
        .login-header i {
            font-size: 3rem;
            margin-bottom: 15px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .login-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin: 0 0 10px 0;
        }
        
        .login-header p {
            font-size: 0.95rem;
            opacity: 0.9;
            margin: 0;
        }
        
        .login-body {
            padding: 40px;
        }
        
        .form-label {
            font-weight: 600;
            color: #34495e;
            font-size: 0.95rem;
            margin-bottom: 8px;
        }
        
        .form-control {
            border: 2px solid #ecf0f1;
            border-radius: 8px;
            padding: 12px 15px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }
        
        .form-control:focus {
            border-color: #27ae60;
            box-shadow: 0 0 0 0.2rem rgba(39, 174, 96, 0.1);
            background-color: #f0fdf4;
        }
        
        .form-control::placeholder {
            color: #bdc3c7;
        }
        
        .form-check-label {
            font-size: 0.9rem;
            color: #7f8c8d;
        }
        
        .btn-login {
            background: #27ae60;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(39, 174, 96, 0.4);
            color: #27ae60;
        }
        
        .btn-login:active {
            transform: translateY(0px);
        }
        
        .login-footer {
            background-color: #f8f9fa;
            padding: 20px;
            text-align: center;
            border-top: 1px solid #ecf0f1;
        }
        
        .login-footer p {
            margin: 0;
            font-size: 0.85rem;
            color: #7f8c8d;
        }
        
        .toast-container {
            z-index: 1100;
        }
        
        .login-features {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #ecf0f1;
        }
        
        .feature-item {
            text-align: center;
            font-size: 0.8rem;
            color: #7f8c8d;
        }
        
        .feature-item i {
            display: block;
            color: #27ae60;
            font-size: 1.3rem;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="toast-container p-3 position-fixed top-0 end-0">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="toast align-items-center text-bg-{{ 'success' if category == 'success' else 'danger' }} border-0 mb-2" role="alert" aria-live="assertive" aria-atomic="true">
                    <div class="d-flex">
                        <div class="toast-body">
                            {{ message }}
                        </div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                    </div>
                </div>
            {% endfor %}
        {% endwith %}
    </div>

    <div class="login-container">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <img src="static/images/logo.jpeg" 
                  alt="Logo Entreprise" 
                  class="img-fluid" 
                  style="max-height: 100px;">
                <p>Plateforme de Gestion Fonciere</p>
            </div>

            <!-- Body -->
            <div class="login-body">
                <form id="loginForm" action="{{ url_for('login') }}" method="POST">
                    <!-- Username Field -->
                    <div class="mb-3">
                        <label for="username" class="form-label">
                            <i class="fas fa-user me-2" style="color: #27ae60;"></i>Nom d'utilisateur
                        </label>
                        <input
                            type="text"
                            class="form-control"
                            id="username"
                            name="username"
                            placeholder="Entrez votre identifiant"
                            required
                        />
                    </div>

                    <!-- Password Field -->
                    <div class="mb-3">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock me-2" style="color: #27ae60;"></i>Mot de passe
                        </label>
                        <input
                            type="password"
                            class="form-control"
                            id="password"
                            name="password"
                            placeholder="Entrez votre mot de passe"
                            required
                        />
                    </div>

                    <!-- Remember Me -->
                    <div class="mb-3 form-check">
                        <input
                            type="checkbox"
                            class="form-check-input"
                            id="remember"
                            name="remember"
                        />
                        <label class="form-check-label" for="remember">
                            Se souvenir de moi
                        </label>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn btn-login w-100">
                        <i class="fas fa-sign-in-alt me-2"></i>Connexion
                    </button>
                </form>
                <div class="login-features text-center mb-4">
                    <div class="feature-item">
                        <i class="fas fa-shield-alt"></i>
                        Sécurité renforcée
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-users"></i>
                        Gestion multi-utilisateurs
                    </div>
                    <div class="feature-item">
                        <i class="fas fa-cogs"></i>
                        Personnalisation avancée
                    </div>
                </div>
            </div>

            <!-- Footer -->
            <div class="login-footer">
                <p><i class="fas fa-copyright me-1"></i> 2026 Gestion Foncière. Tous droits réservés.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        const toastElList = [].slice.call(document.querySelectorAll('.toast'))
        toastElList.forEach(function (toastEl) {
          const toast = new bootstrap.Toast(toastEl)
          toast.show()
        })
      });
    </script>
</body>
</html>
