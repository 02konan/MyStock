{% extends 'index.html' %} {% block content %}
<div id="attendance-content" class="content-section">
  <div class="container-fluid p-4">
    <h2 class="mb-4 text-center p-3 text-white rounded shadow-sm w-100" style="background-color: #0F6735;">Gestion des Utilisateurs</h2>
    <div class="card mb-4 border-0 shadow-sm">
      <div class="card border-0">
        <div
          class="card-body d-flex justify-content-between align-items-center flex-wrap gap-3"
        >
          <!-- Gauche : bouton + sélecteur -->
          <div class="d-flex align-items-center gap-3 flex-wrap">
            <!-- Bouton ajout -->
            <button
              class="btn"
              style="background-color: #058f8f; color: white;"
              data-bs-toggle="modal"
              data-bs-target="#ajoutModal"
            >
              <i class="fas fa-plus me-2"></i>Ajouter un utilisateur
            </button>

            <!-- Sélecteur du nombre -->
            <div class="d-flex align-items-center">
              <label for="itemsPerPage" class="me-2 mb-0">Afficher :</label>
              <select class="form-select w-auto" id="itemsPerPage">
                <option value="10">10</option>
                <option value="25">25</option>
                <option value="50">50</option>
                <option value="100">100</option>
              </select>
            </div>
          </div>

          <!-- Droite : champ recherche -->
          <div class="input-group w-auto">
            <span class="input-group-text"><i class="fas fa-search"></i></span>
            <input
              type="text"
              class="form-control"
              placeholder="Rechercher..."
              id="searchInput"
            />
          </div>
        </div>
      </div>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-header" style="background-color: #f8f9fa; border: none;">
        <h5 class="card-title mb-0" style="color: #0F6735;"><i class="fas fa-users me-2"></i>Liste des utilisateurs</h5>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-hover table-sm" id="Table">
            <thead style="background-color: #f8f9fa;">
              <tr>
                <th>Nom d'utilisateur</th>
                <th>Email</th>
                <th>Mot de pass</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              {% for u in users %}
              <tr>
                <td><strong>{{ u.nom }}</strong></td>
                <td>{{ u.email }}</td>
                <td><code style="background-color: #f8f9fa; padding: 2px 6px;">{{ u.mpd }}</code></td>
                <td><span class="badge" style="background-color: #3498db;">{{ u.role }}</span></td>
                <td>
                  <a
                    href="#"
                    class="btn btn-sm btn-edit"
                    style="background-color: #3498db; color: white;"
                    data-bs-toggle="modal"
                    data-bs-target="#ajoutModal"
                    data-id="{{ u.id }}"
                    data-nom="{{ u.nom }}"
                    data-email="{{ u.email }}"
                    data-role="{{ u.role }}"
                  >
                    <i class="fas fa-edit me-1"></i>Modifier
                  </a>
                  <a
                    href=""
                    class="btn btn-sm"
                    style="background-color: #e74c3c; color: white;"
                    data-bs-toggle="modal"
                    data-bs-target=""
                  >
                    <i class="fas fa-trash me-1"></i>Supprimer
                  </a>
                </td>
              </tr>
              {% endfor %}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Modal pour ajouter un utilisateur -->
<div
  class="modal fade"
  id="ajoutModal"
  tabindex="-1"
  aria-labelledby="ajoutModalLabel"
  aria-hidden="true"
>
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header" style="background-color: #0F6735; color: white; border: none;">
        <h5 class="modal-title text-white" id="ajoutModalLabel">Ajouter un utilisateur</h5>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="modal"
          aria-label="Close"
        ></button>
      </div>
      <form
        id="addUserForm"
        method="POST"
        action="{{ url_for('ajouter_utilisateur') }}"
      >
        <div class="modal-body">
          <div class="mb-3">
            <label for="nom" class="form-label">Nom d'utilisateur</label>
            <input
              type="text"
              class="form-control"
              id="nomuser"
              name="nomuser"
              required
            />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              class="form-control"
              id="email"
              name="Email"
              required
            />
          </div>
          <div class="mb-3">
            <label for="motpass" class="form-label">Mot de passe</label>
            <input
              type="password"
              class="form-control"
              id="motpass"
              name="pass"
              required
            />
          </div>
          <div class="mb-3">
            <label for="role" class="form-label">Role</label>
            <select class="form-select" id="role" name="role">
              <option value="">Sélectionner un rôle</option>
              {% for role in roles %}
              <option value="{{ role['id'] }}">{{ role['nom'] }}</option>
              {% endfor %}
            </select>
          </div>
        </div>
        <div class="modal-footer" style="border-top: 1px solid #e9ecef;">
          <button type="submit" class="btn" style="background-color: #0F6735; color: white;">Enregistrez</button>
          <button
            type="button"
            class="btn"
            style="background-color: #95a5a6; color: white;"
            data-bs-dismiss="modal"
          >
            Fermer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll(".btn-edit").forEach(button=>{
    button.addEventListener("click",function(){
      document.getElementById("nomuser").value=this.dataset.nom
      document.getElementById("email").value=this.dataset.email
      document.getElementById("role").value=this.dataset.role
    })
  })
</script>
{% endblock %}
